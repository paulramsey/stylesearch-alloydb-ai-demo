file_type: demo

type: application

title: Cymbal Shops StyleSearch AlloyDB AI Demo

thumbnail_summary: A retail hybrid search experience powered by AlloyDB AI.

purpose: Demonstrates the AI capabilities of Google Cloud AlloyDB for PostgreSQL, focusing on hybrid search (SQL + vector + full-text search) using a sample e-commerce dataset.

business_value: Enables retail developers to build intelligent, state-of-the-art search and discovery experiences that improve customer engagement and conversion rates.

technical_value: Showcases how to generate vector embeddings, use ScaNN indexes for high-performance similarity search, execute hybrid queries, and leverage AlloyDB Multimodal AI with Imagen3 and Gemini.

